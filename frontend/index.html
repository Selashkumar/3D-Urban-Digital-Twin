<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time 3D Urban Digital Twin — Google Earth-style 3D city with live building data and fleet tracking powered by CesiumJS + OGC API." />
    <meta name="theme-color" content="#f3f4f6" />

    <title>3D Urban Digital Twin | Spatial City Canvas</title>

    <!-- CesiumJS Widget CSS -->
    <link rel="stylesheet" href="/cesium/Widgets/widgets.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body {
        background-color: #f3f4f6;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Hide default Cesium branding and toolbar for clean look */
      .cesium-viewer-toolbar { display: none !important; }
      .cesium-viewer-animationContainer { display: none !important; }
      .cesium-viewer-timelineContainer { display: none !important; }
      .cesium-viewer-bottom { display: none !important; }
      .cesium-widget-credits { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
