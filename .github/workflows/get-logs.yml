name: Get Logs
on:
  push:
    branches: [main]
permissions:
  actions: read
  contents: write
jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download job logs
        run: |
          curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Selashkumar/3D-Urban-Digital-Twin/actions/jobs/82771369105/logs" > swa_fail_logs.txt
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add swa_fail_logs.txt
          git commit -m "chore: save failed logs [skip ci]" || exit 0
          git push
