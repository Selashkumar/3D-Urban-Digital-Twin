name: Debug Secrets
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Debug secrets to file
        run: |
          echo "=== SECRETS DEBUG ===" > secrets_debug.txt
          echo -n "AZURE_WEBAPP_NAME: " >> secrets_debug.txt
          echo -n "${{ secrets.AZURE_WEBAPP_NAME }}" | base64 >> secrets_debug.txt
          echo -n "VITE_API_BASE_URL: " >> secrets_debug.txt
          echo -n "${{ secrets.VITE_API_BASE_URL }}" | base64 >> secrets_debug.txt
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add secrets_debug.txt
          git commit -m "chore: temporary secrets debug [skip ci]" || exit 0
          git push
