name: Debug Secrets
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Extract webapp name from publish profile
        shell: python
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          import os
          import xml.etree.ElementTree as ET
          
          xml_content = os.environ.get("PUBLISH_PROFILE", "")
          if not xml_content:
              print("No publish profile found.")
              with open("secrets_debug.txt", "w") as f:
                  f.write("No publish profile found.")
              exit(0)
              
          try:
              root = ET.fromstring(xml_content)
              profiles = []
              for profile in root.findall('.//publishProfile'):
                  site = profile.get('msdeploySite')
                  url = profile.get('destinationAppUrl')
                  profiles.append(f"msdeploySite: {site} | destinationAppUrl: {url}")
              
              output = "\n".join(profiles)
              print("Extracted profiles:", output)
              with open("secrets_debug.txt", "w") as f:
                  f.write(output)
          except Exception as e:
              print("Error:", e)
              with open("secrets_debug.txt", "w") as f:
                  f.write(f"Error parsing publish profile: {e}")
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add secrets_debug.txt
          git commit -m "chore: extract app URL from publish profile [skip ci]" || exit 0
          git push
